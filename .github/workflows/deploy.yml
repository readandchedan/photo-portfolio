name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add VPS host to known_hosts
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$VPS_KNOWN_HOSTS" ]; then
            printf '%s\n' "$VPS_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            echo "::warning::VPS_KNOWN_HOSTS not set; falling back to ssh-keyscan for $VPS_HOST"
            ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via tar over SSH
        env:
          REMOTE_USER: ${{ secrets.VPS_USER }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_DIR: ${{ secrets.VPS_DIR }}
        run: |
          echo "Deploying to $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR"
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='CLAUDE.md' \
              -czf - . | \
            ssh -o StrictHostKeyChecking=yes "$REMOTE_USER@$REMOTE_HOST" \
              "rm -rf $REMOTE_DIR && mkdir -p $REMOTE_DIR && tar -xzf - -C $REMOTE_DIR"

      - name: Summary
        run: |
          echo "### Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Site served from \`${{ secrets.VPS_DIR }}\` on \`${{ secrets.VPS_HOST }}\`" >> $GITHUB_STEP_SUMMARY
